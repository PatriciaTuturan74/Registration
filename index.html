<!DOCTYPE html>
<html>
<head>
    <title>BSIS Website</title>

<style>

body{
    font-family: Arial;
    background: linear-gradient(to right, #1e3c72, #2a5298);
    margin: 0;
    padding: 0;
}

.container{
    width: 400px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

h2{
    color: navy;
    margin-bottom: 20px;
}

input{
    width: 90%;
    padding: 12px;
    margin: 8px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 14px;
}

button{
    padding: 12px 25px;
    background: navy;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 10px;
}

button:hover{
    background: #003366;
}

img{
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 4px solid navy;
    margin-bottom: 15px;
}

#loginPage,
#dashboard{
    display: none;
}

/* DASHBOARD DESIGN */

.dashboard-card{
    background: #f4f7fb;
    padding: 15px;
    border-radius: 12px;
    text-align: left;
    margin-top: 15px;
}

.dashboard-card p{
    font-size: 16px;
    margin: 10px 0;
    color: #333;
}

.dashboard-card span{
    font-weight: bold;
    color: navy;
}

</style>
</head>

<body>

<!-- REGISTER PAGE -->

<div class="container" id="registerPage">

    <h2>Registration Form</h2>

    <input type="text" id="name" placeholder="Full Name">

    <input type="text" id="course" placeholder="Course">

    <input type="number" id="age" placeholder="Age">

    <input type="date" id="birthdate">

    <input type="text" id="province" placeholder="Province">

    <input type="text" id="municipality" placeholder="Municipality">

    <input type="text" id="username" placeholder="Username">

    <input type="password" id="password" placeholder="Password">

    <button onclick="register()">Register</button>

    <p>
        Already have account?
        <a href="#" onclick="showLogin()">Login</a>
    </p>

</div>

<!-- LOGIN PAGE -->

<div class="container" id="loginPage">

    <h2>Login Form</h2>

    <input type="text" id="loginUser" placeholder="Username">

    <input type="password" id="loginPass" placeholder="Password">

    <button onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->

<div class="container" id="dashboard">

    <h2>Student Dashboard</h2>

    <img src="profile.jpg">

    <h3 id="displayName"></h3>

    <div class="dashboard-card">

        <p><span>Course:</span> <span id="displayCourse"></span></p>

        <p><span>Age:</span> <span id="displayAge"></span></p>

        <p><span>Birthdate:</span> <span id="displayBirthdate"></span></p>

        <p><span>Province:</span> <span id="displayProvince"></span></p>

        <p><span>Municipality:</span> <span id="displayMunicipality"></span></p>

    </div>

    <button onclick="logout()">Logout</button>

</div>

<script>

function showLogin(){

document.getElementById("registerPage").style.display = "none";

document.getElementById("loginPage").style.display = "block";

}

function register(){

let name = document.getElementById("name").value;

let course = document.getElementById("course").value;

let age = document.getElementById("age").value;

let birthdate = document.getElementById("birthdate").value;

let province = document.getElementById("province").value;

let municipality = document.getElementById("municipality").value;

let username = document.getElementById("username").value;

let password = document.getElementById("password").value;

localStorage.setItem("name", name);

localStorage.setItem("course", course);

localStorage.setItem("age", age);

localStorage.setItem("birthdate", birthdate);

localStorage.setItem("province", province);

localStorage.setItem("municipality", municipality);

localStorage.setItem("username", username);

localStorage.setItem("password", password);

alert("Registration Successful!");

showLogin();

}

function login(){

let loginUser = document.getElementById("loginUser").value;

let loginPass = document.getElementById("loginPass").value;

let storedUser = localStorage.getItem("username");

let storedPass = localStorage.getItem("password");

if(loginUser == storedUser && loginPass == storedPass){

document.getElementById("loginPage").style.display = "none";

document.getElementById("dashboard").style.display = "block";

document.getElementById("displayName").innerHTML =
localStorage.getItem("name");

document.getElementById("displayCourse").innerHTML =
localStorage.getItem("course");

document.getElementById("displayAge").innerHTML =
localStorage.getItem("age");

document.getElementById("displayBirthdate").innerHTML =
localStorage.getItem("birthdate");

document.getElementById("displayProvince").innerHTML =
localStorage.getItem("province");

document.getElementById("displayMunicipality").innerHTML =
localStorage.getItem("municipality");

}

else{

alert("Invalid Username or Password");

}

}

function logout(){

document.getElementById("dashboard").style.display = "none";

document.getElementById("loginPage").style.display = "block";

}

</script>

</body>
</html>
